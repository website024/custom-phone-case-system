<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customize — Cadeau Case</title>
  <link rel="stylesheet" href="customize.css" />
</head>

<body>
  <header class="navbar">
    <div class="nav-content">
      <a class="logo-wrapper" href="../home/index.html">
        <span class="logo-dot"></span>
        <span class="logo-container">
          <span class="logo-c">C</span><span class="logo-a">a</span><span class="logo-d">d</span><span class="logo-e">e</span><span class="logo-a2">a</span><span class="logo-u">u</span>
          <span class="logo-box"><span class="logo-case-text">CASE</span></span>
        </span>
      </a>

      <nav class="nav-links">
        <a href="../home/index.html">Home</a><span class="nav-divider">|</span>
        <a href="../customize/customize.html">Customize</a><span class="nav-divider">|</span>
        <a href="../my-orders/my-orders.html">My Orders</a><span class="nav-divider">|</span>
        <a href="../tracking/tracking.html">Tracking</a><span class="nav-divider">|</span>
        <a href="../feedback/feedback.html">Feedback</a><span class="nav-divider">|</span>

        <a href="../auth/login.html" class="nav-icon-link">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>

        <a href="../cart/cart.html" class="cart-icon">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 0 1-8 0"></path>
          </svg>
          <span id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="customize-page">
    <section class="tools-panel">
      <h1>Customize Your Case</h1>
      <p class="sub-text">Choose your phone model, add photos, text, stickers, and drag and drop them into the phone case.</p>

      <label>Phone models</label>
      <select id="deviceModel">
        <option value="iphone-x">iPhone X</option>
        <option value="iphone-xr">iPhone XR</option>
        <option value="iphone-xs">iPhone XS</option>
        <option value="iphone-xs-max">iPhone XS Max</option>

        <option value="iphone-11">iPhone 11</option>
        <option value="iphone-12">iPhone 12</option>
        <option value="iphone-12-max">iPhone 12 Max</option>
        <option value="iphone-13-mini">iPhone 13 Mini</option>
        <option value="iphone-13">iPhone 13</option>
        <option value="iphone-14">iPhone 14</option>
        <option value="iphone-14-plus">iPhone 14 Plus</option>
        <option value="iphone-15">iPhone 15</option>
        <option value="iphone-15-plus">iPhone 15 Plus</option>

        <option value="iphone-11-pro">iPhone 11 Pro</option>
        <option value="iphone-11-promax">iPhone 11 Pro Max</option>
        <option value="iphone-12-pro">iPhone 12 Pro</option>
        <option value="iphone-12-promax">iPhone 12 Pro Max</option>
        <option value="iphone-13-pro">iPhone 13 Pro</option>
        <option value="iphone-13-promax">iPhone 13 Pro Max</option>
        <option value="iphone-14-pro">iPhone 14 Pro</option>
        <option value="iphone-14-promax">iPhone 14 Pro Max</option>
        <option value="iphone-15-pro">iPhone 15 Pro</option>
        <option value="iphone-15-promax">iPhone 15 Pro Max</option>
        <option value="iphone-16-pro">iPhone 16 Pro</option>
        <option value="iphone-16-promax">iPhone 16 Pro Max</option>

        <option value="iphone-16e">iPhone 16e</option>
        <option value="iphone-16">iPhone 16</option>
        <option value="iphone-16-plus">iPhone 16 Plus</option>
        <option value="iphone-17">iPhone 17</option>
        <option value="iphone-17-pro">iPhone 17 Pro</option>
        <option value="iphone-17-promax">iPhone 17 Pro Max</option>

        <option value="ipad-mini-6">iPad Mini 6</option>
        <option value="ipad-mini-7">iPad Mini 7</option>
        <option value="ipad-air-5-m1">iPad Air 5 M1</option>
        <option value="ipad-air-m2">iPad Air M2</option>
        <option value="ipad-air-m3">iPad Air M3</option>

        <option value="ipad-pro-m1">iPad Pro M1</option>
        <option value="ipad-pro-m2">iPad Pro M2</option>
        <option value="ipad-pro-m4">iPad Pro M4</option>
        <option value="ipad-pro-m5">iPad Pro M5</option>
      </select>

      <label>Case type</label>
      <select id="caseType">
        <option value="clear" data-price="120000">Clear case - 120.000đ</option>
        <option value="silicone" data-price="150000">Silicone case - 150.000đ</option>
        <option value="shockproof" data-price="180000">Shockproof case - 180.000đ</option>
        <option value="matte" data-price="160000">Matte case - 160.000đ</option>
      </select>

      <label>Upload photos</label>
      <input type="file" id="imageUpload" accept="image/*" />
      <button type="button" id="removeBgBtn">Separate the white background.</button>

      <label>Add text</label>
      <input type="text" id="customText" placeholder="Enter text to print..." />
      <button type="button" id="addTextBtn">Add text to case</button>

      <label>Font</label>
      <select id="fontSelect">
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="'Times New Roman'">Times New Roman</option>
        <option value="'Comic Sans MS'">Comic Sans</option>
        <option value="Verdana">Verdana</option>
        <option value="Impact">Impact</option>
      </select>

      <label>Text Color</label>
      <input type="color" id="textColor" value="#20164d" />

      <label>Sticker</label>
      <div class="sticker-list">
        <button type="button" class="sticker-btn" data-sticker="images/stickers/1.png"><img src="images/stickers/1.png"></button>
        <button type="button" class="sticker-btn" data-sticker="images/stickers/2.png"><img src="images/stickers/2.png"></button>
        <button type="button" class="sticker-btn" data-sticker="images/stickers/3.png"><img src="images/stickers/3.png"></button>
        <button type="button" class="sticker-btn" data-sticker="images/stickers/4.png"><img src="images/stickers/4.png"></button>
        <button type="button" class="sticker-btn" data-sticker="images/stickers/5.png"><img src="images/stickers/5.png"></button>
        <button type="button" class="sticker-btn" data-sticker="images/stickers/6.png"><img src="images/stickers/6.png"></button>
        <button type="button" class="sticker-btn" data-sticker="images/stickers/7.png"><img src="images/stickers/7.png"></button>
        <button type="button" class="sticker-btn" data-sticker="images/stickers/8.png"><img src="images/stickers/8.png"></button>
        <button type="button" class="sticker-btn" data-sticker="images/stickers/9.png"><img src="images/stickers/9.png"></button>
        <button type="button" class="sticker-btn" data-sticker="images/stickers/10.png"><img src="images/stickers/10.png"></button>
        <button type="button" class="sticker-btn" data-sticker="images/stickers/11.png"><img src="images/stickers/11.png"></button>
      </div>

      <label>Accessories</label>
      <div class="accessory-list">
        <label><input type="checkbox" class="accessory" value="Dây đeo" data-price="30000"> Dây đeo +30.000đ</label>
        <label><input type="checkbox" class="accessory" value="Charm" data-price="25000"> Charm +25.000đ</label>
        <label><input type="checkbox" class="accessory" value="Sticker pack" data-price="20000"> Sticker pack +20.000đ</label>
      </div>

      <div class="price-box">Total price: <strong id="totalPrice">120.000đ</strong></div>

      <div class="button-row">
        <button id="saveDesignBtn">Save Design</button>
        <button id="addToCartBtn">Add to Cart</button>
      </div>
    </section>

    <section class="preview-panel">
      <p class="preview-title">LIVE PREVIEW</p>

      <div class="case-workspace" id="caseWorkspace">
        <div class="design-area" id="designArea"></div>
        <div class="camera-mask" id="cameraMask"></div>
        <img id="caseFrame" src="images/ipX.png" alt="case frame">
      </div>

      <p class="hint">Drag items into the case. Scroll to zoom. Click × to delete.</p>
    </section>
  </main>

  <div class="preview-modal" id="previewModal">
    <div class="preview-box">
      <h2>Saved Designs</h2>

      <div class="saved-preview" id="savedPreview"></div>

      <div class="modal-actions">
        <button id="editAgainBtn">Edit Again</button>
        <button id="confirmCartBtn">Add to Cart</button>
      </div>
    </div>
  </div>

  <script src="customize.js"></script>
</body>
</html>
