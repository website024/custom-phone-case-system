<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Admin Login — Cadeau Case</title>

  <!-- GOOGLE FONT -->

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&family=Fredoka:wght@600;700&display=swap"
    rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet"
    href="auth.css">

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="nav-content">

      <a href="../home/index.html"
        class="logo-wrapper">

        <div class="logo-dot"></div>

        <div class="logo-container">

          <span class="logo-c">C</span>
          <span class="logo-a">a</span>
          <span class="logo-d">d</span>
          <span class="logo-e">e</span>
          <span class="logo-a2">a</span>
          <span class="logo-u">u</span>

          <div class="logo-box">

            <span class="logo-case-text">
              Case
            </span>

          </div>

        </div>

      </a>

      <nav class="nav-links">

        <a href="../home/index.html">
          Home
        </a>

        <a href="login.html">
          User Login
        </a>

      </nav>

    </div>

  </header>

  <!-- PAGE -->

  <div class="auth-page">

    <!-- LEFT -->

    <div class="auth-left admin-left">

      <h1>
        Admin
        Dashboard
      </h1>

      <p>
        Manage orders, customers,
        products, and custom case
        designs from one place.
      </p>

    </div>

    <!-- RIGHT -->

    <div class="auth-right">

      <div class="auth-card admin-card">

        <div class="admin-badge">
          ADMIN PORTAL
        </div>

        <h2>
          Admin Login
        </h2>

        <p class="subtext">
          Access management dashboard
        </p>

        <!-- EMAIL -->

        <div class="field">

          <label>
            Admin Email
          </label>

          <input
            type="email"
            id="admin-email"
            placeholder="admin@cadeaucase.com">

        </div>

        <!-- PASSWORD -->

        <div class="field">

          <div class="field-row">

            <label>
              Password
            </label>

            <a href="#"
              class="forgot-link">

              Forgot password?

            </a>

          </div>

          <input
            type="password"
            id="admin-password"
            placeholder="••••••••">

        </div>

        <!-- BUTTON -->

        <button
          class="btn-submit admin-btn">

          Login as Admin

        </button>

        <!-- BOTTOM -->

        <div class="bottom-text">

          Return to

          <a href="login.html">
            User Login
          </a>

        </div>

      </div>

    </div>

  </div>

<script src="auth.js"></script>  
</body>

</html>
