<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Register — Cadeau Case</title>

  <!-- GOOGLE FONT -->

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@700&family=Fredoka:wght@600;700&display=swap"
    rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet"
    href="auth.css">

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="nav-content">

      <a href="../home/index.html"
        class="logo-wrapper">

        <div class="logo-dot"></div>

        <div class="logo-container">

          <span class="logo-c">C</span>
          <span class="logo-a">a</span>
          <span class="logo-d">d</span>
          <span class="logo-e">e</span>
          <span class="logo-a2">a</span>
          <span class="logo-u">u</span>

          <div class="logo-box">

            <span class="logo-case-text">
              Case
            </span>

          </div>

        </div>

      </a>

      <nav class="nav-links">

        <a href="../home/index.html">
          Home
        </a>

        <a href="#">
          Customize
        </a>

        <a href="login.html"
          class="btn-nav">

          Login

        </a>

      </nav>

    </div>

  </header>

  <!-- PAGE -->

  <div class="auth-page">

    <!-- LEFT -->

    <div class="auth-left">

      <h1>
        Create Your
        Account
      </h1>

      <p>
        Start creating beautiful
        custom phone cases
        with your own style.
      </p>

    </div>

    <!-- RIGHT -->

    <div class="auth-right">

      <div class="auth-card">

        <h2>
          Register
        </h2>

        <p class="subtext">
          Create a new account
        </p>

        <!-- FULL NAME -->

        <div class="field">

          <label>
            Full Name
          </label>

          <input
            type="text"
            placeholder="Your full name">

        </div>

        <!-- EMAIL -->

        <div class="field">

          <label>
            Email address
          </label>

          <input
            type="email"
            placeholder="you@example.com">

        </div>

        <!-- PASSWORD -->

        <div class="field">

          <label>
            Password
          </label>

          <input
            type="password"
            placeholder="••••••••">

        </div>

        <!-- CONFIRM -->

        <div class="field">

          <label>
            Confirm Password
          </label>

          <input
            type="password"
            placeholder="••••••••">

        </div>

        <!-- BUTTON -->

        <button
          class="btn-submit">

          Create Account

        </button>

        <!-- DIVIDER -->

        <div class="divider">

          <span>
            or continue with
          </span>

        </div>

        <!-- SOCIAL -->

        <div class="social-row">

          <button
            class="btn-social">

            Google

          </button>

          <button
            class="btn-social">

            Apple

          </button>

        </div>

        <!-- BOTTOM -->

        <div class="bottom-text">

          Already have an account?

          <a href="login.html">
            Login
          </a>

        </div>

      </div>

    </div>

  </div>

</body>

</html>
