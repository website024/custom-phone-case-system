<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Cadeau Case</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@700&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --pink: #f472b6;
      --pink-light: #fce7f3;
      --pink-mid: #ec4899;
      --purple: #a78bfa;
      --purple-light: #ede9fe;
      --rose: #fb7185;
      --text-dark: #1e1b4b;
      --text-mid: #6b7280;
      --text-soft: #9ca3af;
      --bg: #fff8fc;
      --shadow-sm: 0 2px 12px rgba(236,72,153,0.08);
      --shadow-md: 0 8px 32px rgba(236,72,153,0.12);
      --shadow-lg: 0 20px 60px rgba(167,139,250,0.18);
      --radius-md: 16px;
      --radius-lg: 24px;
    }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
 
    /* ── NAVBAR ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,248,252,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(244,114,182,0.12);
      padding: 0 4%;
    }
 
    .nav-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 85px; /* Đồng bộ chiều cao navbar như trang index */
      max-width: 1200px;
      margin: 0 auto;
    }
 
    /* ĐỒNG BỘ LOGO THƯƠNG HIỆU TỪ INDEX */
    .logo-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background: linear-gradient(135deg, var(--pink-mid), var(--purple));
      border-radius: 50%;
    }
 
    .logo-container {
      display: inline-flex;
      align-items: center;
      font-family: 'Fredoka', sans-serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
 
    .logo-c { color: #f472b6; } 
    .logo-a { color: #f472b6; } 
    .logo-d { color: #a78bfa; } 
    .logo-e { color: #ec4899; } 
    .logo-a2 { color: #ec4899; } 
    .logo-u { color: #a78bfa; } 
    
    .logo-box {
      border: 2px solid rgba(236,72,153,0.3);
      padding: 0px 8px;
      border-radius: 10px;
      margin-left: 6px;
      display: inline-flex;
      align-items: center;
      background: #fff;
      height: 38px;
    }
    .logo-case-text { 
      color: var(--pink-mid); 
      font-size: 24px;
      text-transform: uppercase;
      font-weight: 700;
    }
 
    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }
 
    .nav-links a {
      text-decoration: none;
      font-size: 14px;
      color: var(--text-dark);
      font-weight: 600;
      transition: color 0.2s;
    }
 
    .nav-links a:hover { color: var(--pink-mid); }
 
    .btn-nav {
      background: linear-gradient(135deg, var(--pink-mid), var(--rose));
      color: #fff !important;
      padding: 8px 22px;
      border-radius: 20px;
      font-size: 13.5px !important;
      font-weight: 600 !important;
    }
 
    .btn-nav:hover { opacity: 0.88; }
 
    /* ── PAGE LAYOUT ── */
    .auth-page {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 85px);
    }
 
    /* ── LEFT PANEL ── */
    .auth-left {
      background: linear-gradient(145deg, #fce7f3 0%, #ede9fe 55%, #dbeafe 100%);
      padding: 72px 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
 
    /* decorative blobs */
    .auth-left::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(236,72,153,0.18) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
    }
 
    .auth-left::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -60px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(167,139,250,0.20) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
    }
 
    .auth-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 5vw, 64px);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--pink-mid) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
    }
 
    .auth-left p {
      font-size: 16px;
      color: var(--text-mid);
      line-height: 1.7;
      max-width: 320px;
      position: relative;
      z-index: 1;
    }
 
    /* floating phone decoration */
    .deco-phone {
      position: absolute;
      bottom: 60px;
      right: 48px;
      z-index: 1;
      opacity: 0.92;
      animation: float-deco 4s ease-in-out infinite;
    }
 
    @keyframes float-deco {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-10px) rotate(-4deg); }
    }
 
    /* ── RIGHT PANEL ── */
    .auth-right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 5%;
      position: relative;
    }
 
    .auth-right::before {
      content: '';
      position: absolute;
      top: 20%; right: -40px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(244,114,182,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
 
    /* ── CARD ── */
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 44px 40px;
      border: 1px solid rgba(244,114,182,0.14);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }
 
    .auth-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
 
    .subtext {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 32px;
    }
 
    /* ── FORM FIELDS ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 16px;
    }
 
    .field label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 0.1px;
    }
 
    .field input {
      height: 48px;
      border: 1.5px solid rgba(244,114,182,0.22);
      border-radius: 12px;
      padding: 0 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
 
    .field input:focus {
      border-color: var(--pink-mid);
      box-shadow: 0 0 0 3px rgba(236,72,153,0.10);
    }
 
    .field input::placeholder { color: var(--text-soft); }
 
    /* forgot link row */
    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
 
    .field-row label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
    }
 
    .forgot-link {
      font-size: 12px;
      color: var(--pink-mid);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }
 
    .forgot-link:hover { opacity: 0.7; }
 
    /* ── SUBMIT ── */
    .btn-submit {
      width: 100%;
      height: 50px;
      background: linear-gradient(135deg, var(--pink-mid), #c026d3);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 24px;
    }
 
    .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:active { transform: scale(0.98); }
 
    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
 
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(244,114,182,0.18);
    }
 
    .divider span {
      font-size: 12px;
      color: var(--text-soft);
      white-space: nowrap;
    }
 
    /* ── SOCIAL BUTTONS ── */
    .social-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
 
    .btn-social {
      flex: 1;
      height: 44px;
      border: 1.5px solid rgba(244,114,182,0.18);
      border-radius: 12px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
    }
 
    .btn-social:hover {
      background: var(--pink-light);
      border-color: rgba(236,72,153,0.28);
    }
 
    .btn-social svg { flex-shrink: 0; }
 
    /* ── BOTTOM TEXT ── */
    .bottom-text {
      text-align: center;
      font-size: 13px;
      color: var(--text-soft);
    }
 
    .bottom-text a {
      color: var(--pink-mid);
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
 
    .bottom-text a:hover { opacity: 0.75; }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 980px) {
      .auth-page { grid-template-columns: 1fr; min-height: auto; }
      .auth-left { display: none; }
      .auth-right { padding: 32px 5%; align-items: flex-start; padding-top: 48px; }
      .auth-card { padding: 32px 24px; }
      .deco-phone { display: none; }
    }
  </style>
</head>
<body>
 
  <header class="navbar">
    <div class="nav-content">
      
      <a href="../home/index.html" class="logo-wrapper">
        <div class="logo-dot"></div>
        <div class="logo-container">
          <span class="logo-c">C</span>
          <span class="logo-a">a</span>
          <span class="logo-d">d</span>
          <span class="logo-e">e</span>
          <span class="logo-a2">a</span>
          <span class="logo-u">u</span>
          <div class="logo-box">
            <span class="logo-case-text">Case</span>
          </div>
        </div>
      </a>

      <nav class="nav-links">
        <a href="../home/index.html">Home</a>
        <a href="#">Customize</a>
        <a href="login.html" class="btn-nav">Login</a>
      </nav>
    </div>
  </header>
 
  <div class="auth-page">
 
    <div class="auth-left">
      <h1>Welcome<br>Back</h1>
      <p>Continue designing beautiful custom phone cases. Your next masterpiece is one login away.</p>
 
      <div class="deco-phone">
        <svg width="140" height="240" viewBox="0 0 140 240" xmlns="http://www.w3.org/2000/svg">
          <rect rx="28" ry="28" width="140" height="240" fill="#fff" opacity="0.85"/>
          <rect rx="22" ry="22" x="7" y="7" width="126" height="226" fill="none" stroke="rgba(236,72,153,0.18)" stroke-width="1.5"/>
          <rect x="46" y="14" width="48" height="18" rx="9" fill="#f0e6ff"/>
          <rect rx="18" ry="18" x="10" y="36" width="120" height="194" fill="url(#login-phone-bg)"/>
          <defs>
            <linearGradient id="login-phone-bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#fce7f3"/>
              <stop offset="50%" stop-color="#ede9fe"/>
              <stop offset="100%" stop-color="#dbeafe"/>
            </linearGradient>
          </defs>
          <ellipse cx="70" cy="118" rx="11" ry="20" fill="#f9a8d4" opacity="0.9" transform="rotate(0 70 118)"/>
          <ellipse cx="70" cy="118" rx="11" ry="20" fill="#f472b6" opacity="0.7" transform="rotate(72 70 118)"/>
          <ellipse cx="70" cy="118" rx="11" ry="20" fill="#f9a8d4" opacity="0.9" transform="rotate(144 70 118)"/>
          <ellipse cx="70" cy="118" rx="11" ry="20" fill="#f472b6" opacity="0.7" transform="rotate(216 70 118)"/>
          <ellipse cx="70" cy="118" rx="11" ry="20" fill="#f9a8d4" opacity="0.9" transform="rotate(288 70 118)"/>
          <circle cx="70" cy="118" r="14" fill="#fbbf24"/>
          <circle cx="70" cy="118" r="8" fill="#f59e0b"/>
          <rect x="18" y="188" width="104" height="28" rx="10" fill="#fff" opacity="0.9"/>
          <circle cx="34" cy="202" r="7" fill="#fce7f3"/>
          <rect x="45" y="197" width="42" height="5" rx="2.5" fill="#e9d5ff"/>
          <rect x="45" y="207" width="28" height="4" rx="2" fill="#f9a8d4" opacity="0.7"/>
          <rect x="100" y="196" width="14" height="12" rx="4" fill="url(#btn-grad)"/>
          <defs>
            <linearGradient id="btn-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ec4899"/>
              <stop offset="100%" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>
 
    <div class="auth-right">
      <div class="auth-card">
        <h2>Login</h2>
        <p class="subtext">Sign in to your account</p>
 
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
 
        <div class="field">
          <div class="field-row">
            <label for="password">Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
 
        <button class="btn-submit" type="button">Login</button>
 
        <div class="divider"><span>or continue with</span></div>
 
        <div class="social-row">
          <button class="btn-social" type="button">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button class="btn-social" type="button">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M13.035 9.405c-.02-2.126 1.738-3.154 1.817-3.204-.99-1.447-2.53-1.645-3.08-1.666-1.311-.133-2.568.775-3.234.775-.664 0-1.685-.757-2.773-.736-1.426.021-2.743.833-3.476 2.113-1.49 2.575-.381 6.394 1.07 8.488.714 1.022 1.562 2.171 2.674 2.13 1.077-.044 1.48-.689 2.778-.689 1.298 0 1.66.689 2.793.667 1.16-.02 1.89-1.04 2.594-2.066a9.555 9.555 0 0 0 1.178-2.39c-.028-.013-2.257-.864-2.28-3.422ZM10.89 3.18C11.466 2.481 11.86 1.518 11.748.535c-.824.034-1.826.55-2.42 1.233-.528.607-.99 1.578-.867 2.508.921.07 1.86-.466 2.43-1.095Z" fill="#1D1D1F"/>
            </svg>
            Apple
          </button>
        </div>
 
        <div class="bottom-text">
          Don't have an account? <a href="register.html">Register</a>
        </div>
      </div>
    </div>
 
  </div>
 
</body>
</html>
