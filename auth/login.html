<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Cadeau Case</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@700&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
 
  <header class="navbar">
    <div class="nav-content">
      
      <a href="../home/index.html" class="logo-wrapper">
        <div class="logo-dot"></div>
        <div class="logo-container">
          <span class="logo-c">C</span>
          <span class="logo-a">a</span>
          <span class="logo-d">d</span>
          <span class="logo-e">e</span>
          <span class="logo-a2">a</span>
          <span class="logo-u">u</span>
          <div class="logo-box">
            <span class="logo-case-text">Case</span>
          </div>
        </div>
      </a>

      <nav class="nav-links">
        <a href="../home/index.html">Home</a>
        <a href="#">Customize</a>
        <a href="login.html" class="btn-nav">Login</a>
      </nav>
    </div>
  </header>
 
  <div class="auth-page">
 
    <div class="auth-left">
      <h1>Welcome<br>Back</h1>
      <p>Continue designing beautiful custom phone cases. Your next masterpiece is one login away.</p>
 
      <div class="deco-phone">
        <svg width="140" height="240" viewBox="0 0 140 240" xmlns="http://www.w3.org/2000/svg">
          <rect rx="28" ry="28" width="140" height="240" fill="#fff" opacity="0.85"/>
          <rect rx="22" ry="22" x="7" y="7" width="126" height="226" fill="none" stroke="rgba(236,72,153,0.18)" stroke-width="1.5"/>
          <rect x="46" y="14" width="48" height="18" rx="9" fill="#f0e6ff"/>
          <rect rx="18" ry="18" x="10" y="36" width="120" height="194" fill="url(#login-phone-bg)"/>
          <defs>
            <linearGradient id="login-phone-bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#fce7f3"/>
              <stop offset="50%" stop-color="#ede9fe"/>
              <stop offset="100%" stop-color="#dbeafe"/>
            </linearGradient>
          </defs>
          <ellipse cx="70" cy="118" rx="11" ry="20" fill="#f9a8d4" opacity="0.9" transform="rotate(0 70 118)"/>
          <ellipse cx="70" cy="118" rx="11" ry="20" fill="#f472b6" opacity="0.7" transform="rotate(72 70 118)"/>
          <ellipse cx="70" cy="118" rx="11" ry="20" fill="#f9a8d4" opacity="0.9" transform="rotate(144 70 118)"/>
          <ellipse cx="70" cy="118" rx="11" ry="20" fill="#f472b6" opacity="0.7" transform="rotate(216 70 118)"/>
          <ellipse cx="70" cy="118" rx="11" ry="20" fill="#f9a8d4" opacity="0.9" transform="rotate(288 70 118)"/>
          <circle cx="70" cy="118" r="14" fill="#fbbf24"/>
          <circle cx="70" cy="118" r="8" fill="#f59e0b"/>
          <rect x="18" y="188" width="104" height="28" rx="10" fill="#fff" opacity="0.9"/>
          <circle cx="34" cy="202" r="7" fill="#fce7f3"/>
          <rect x="45" y="197" width="42" height="5" rx="2.5" fill="#e9d5ff"/>
          <rect x="45" y="207" width="28" height="4" rx="2" fill="#f9a8d4" opacity="0.7"/>
          <rect x="100" y="196" width="14" height="12" rx="4" fill="url(#btn-grad)"/>
          <defs>
            <linearGradient id="btn-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ec4899"/>
              <stop offset="100%" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>
 
    <div class="auth-right">
      <div class="auth-card">
        <h2>Login</h2>
        <p class="subtext">Sign in to your account</p>
 
        <div class="field">
          <label for="email">Email address</label>
          <input
             type="email"
             id="login-email"
             placeholder="you@example.com">
        </div>
 
        <div class="field">
          <div class="field-row">
            <label for="password">Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <input
              type="password"
              id="login-password"
              placeholder="••••••••">
        </div>
 
        <button
           class="btn-submit login-btn"
           type="button">

           Login

        </button>
 
        <div class="divider"><span>or continue with</span></div>
 
        <div class="social-row">
          <button class="btn-social" type="button">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button class="btn-social" type="button">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M13.035 9.405c-.02-2.126 1.738-3.154 1.817-3.204-.99-1.447-2.53-1.645-3.08-1.666-1.311-.133-2.568.775-3.234.775-.664 0-1.685-.757-2.773-.736-1.426.021-2.743.833-3.476 2.113-1.49 2.575-.381 6.394 1.07 8.488.714 1.022 1.562 2.171 2.674 2.13 1.077-.044 1.48-.689 2.778-.689 1.298 0 1.66.689 2.793.667 1.16-.02 1.89-1.04 2.594-2.066a9.555 9.555 0 0 0 1.178-2.39c-.028-.013-2.257-.864-2.28-3.422ZM10.89 3.18C11.466 2.481 11.86 1.518 11.748.535c-.824.034-1.826.55-2.42 1.233-.528.607-.99 1.578-.867 2.508.921.07 1.86-.466 2.43-1.095Z" fill="#1D1D1F"/>
            </svg>
            Apple
          </button>
        </div>
 
        <div class="bottom-text">
          Don't have an account? <a href="register.html">Register</a>
        </div>
      </div>
    </div>
 
  </div>

<script src="auth.js"></script>
</body>
</html>
