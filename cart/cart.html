<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Cadeau Case</title>

  <link rel="stylesheet" href="../customize/customize.css" />
  <link rel="stylesheet" href="cart.css" />
</head>

<body>
  <header class="navbar">
    <div class="nav-content">
      <a class="logo-wrapper" href="../home/index.html">
        <span class="logo-dot"></span>
        <span class="logo-container">
          <span class="logo-c">C</span><span class="logo-a">a</span><span class="logo-d">d</span><span class="logo-e">e</span><span class="logo-a2">a</span><span class="logo-u">u</span>
          <span class="logo-box"><span class="logo-case-text">CASE</span></span>
        </span>
      </a>

      <nav class="nav-links">
        <a href="../home/index.html">Home</a><span class="nav-divider">|</span>
        <a href="../customize/customize.html">Customize</a><span class="nav-divider">|</span>
        <a href="../my-orders/my-orders.html">My Orders</a><span class="nav-divider">|</span>
        <a href="../tracking/tracking.html">Tracking</a><span class="nav-divider">|</span>
        <a href="../feedback/feedback.html">Feedback</a><span class="nav-divider">|</span>
        <a href="../cart/cart.html" class="cart-icon">🛍️<span id="cartCount">0</span></a>
      </nav>
    </div>
  </header>

  <main class="cart-page">
    <section class="cart-header">
      <span class="page-tag">Shopping Cart</span>
      <h1>Your Custom Cases</h1>
      <p>Review your customized phone cases before checkout.</p>
    </section>

    <section class="cart-layout">
      <div class="cart-items" id="cartItems"></div>

      <aside class="cart-summary">
        <h2>Order Summary</h2>

        <div class="summary-row">
          <span>Total Items</span>
          <strong id="totalItems">0</strong>
        </div>

        <div class="summary-row">
          <span>Subtotal</span>
          <strong id="subtotal">0đ</strong>
        </div>

        <div class="summary-row">
          <span>Shipping</span>
          <strong id="shippingFee">30.000đ</strong>
        </div>

        <div class="summary-total">
          <span>Total</span>
          <strong id="grandTotal">0đ</strong>
        </div>

        <button id="checkoutBtn" class="btn-primary">Proceed to Checkout</button>
        <a href="../customize/customize.html" class="btn-secondary">Continue Editing</a>
      </aside>
    </section>
  </main>

  <script src="cart.js"></script>
</body>
</html>
